<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 智能截图命名工具 - 本地版</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 React 相关库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <!-- 引入 JSZip 和 FileSaver 用于导出 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #E2E8F0; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #CBD5E1; }
        body { background-color: #F1F5F9; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // 内部图标组件
        const Icon = ({ name, size = 18, className = "" }) => {
            const icons = {
                'list-ordered': <path d="M10 6h11M10 12h11M10 18h11M4 6h1v4M4 10h2M4 18h2.5M3 15.5a1.5 1.5 0 0 1 3 0c0 .83-.67 1.5-1.5 1.5H3" />,
                'save': <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2zM17 21v-8H7v8M7 3v5h8" />,
                'upload': <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12" />,
                'image': (
                    <>
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                        <circle cx="8.5" cy="8.5" r="1.5" />
                        <polyline points="21 15 16 10 5 21" />
                    </>
                ),
                'trash-2': (
                    <>
                        <polyline points="3 6 5 6 21 6" />
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
                        <line x1="10" y1="11" x2="10" y2="17" />
                        <line x1="14" y1="11" x2="14" y2="17" />
                    </>
                ),
                'edit-3': (
                    <>
                        <path d="M12 20h9" />
                        <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" />
                    </>
                ),
                'copy': (
                    <>
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2" />
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
                    </>
                ),
                'download': (
                    <>
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3" />
                    </>
                ),
                'layout-grid': (
                    <>
                        <rect x="3" y="3" width="7" height="7" />
                        <rect x="14" y="3" width="7" height="7" />
                        <rect x="14" y="14" width="7" height="7" />
                        <rect x="3" y="14" width="7" height="7" />
                    </>
                ),
                'key': (
                    <>
                        <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3L15.5 7.5z" />
                    </>
                )
            };

            return (
                <svg 
                    xmlns="http://www.w3.org/2000/svg" 
                    width={size} 
                    height={size} 
                    viewBox="0 0 24 24" 
                    fill="none" 
                    stroke="currentColor" 
                    strokeWidth="2" 
                    strokeLinecap="round" 
                    strokeLinejoin="round" 
                    className={className}
                >
                    {icons[name] || null}
                </svg>
            );
        };

        function App() {
            const [localApiKey, setLocalApiKey] = useState(localStorage.getItem('gemini_api_key') || "");
            const [images, setImages] = useState([]);
            const [processing, setProcessing] = useState(false);
            const [progress, setProgress] = useState(0);
            const [results, setResults] = useState([]);
            const [isExporting, setIsExporting] = useState(false);
            const [errorMsg, setErrorMsg] = useState("");

            // 保存 Key 到本地存储
            const saveApiKey = (val) => {
                setLocalApiKey(val);
                localStorage.setItem('gemini_api_key', val);
            };

            const handleFileChange = async (e) => {
                if (!localApiKey) {
                    setErrorMsg("请先在上方输入您的 Gemini API Key");
                    return;
                }
                setErrorMsg("");
                const files = Array.from(e.target.files);
                if (files.length === 0) return;

                const newImages = files.map(file => ({
                    file,
                    id: Math.random().toString(36).substr(2, 9),
                    preview: URL.createObjectURL(file)
                }));
                
                setImages(newImages); 
                startProcessing(newImages);
            };

            const convertToBase64 = (file) => {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = () => resolve(reader.result.split(',')[1]);
                    reader.onerror = (error) => reject(error);
                });
            };

            const callGemini = async (payload, attempt = 0) => {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${localApiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    if (!response.ok) {
                        const errorData = await response.json();
                        throw new Error(errorData.error?.message || 'API request failed');
                    }
                    const data = await response.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text || "";
                } catch (err) {
                    if (attempt < 4) {
                        await new Promise(r => setTimeout(r, Math.pow(2, attempt) * 1000));
                        return callGemini(payload, attempt + 1);
                    }
                    throw err;
                }
            };

            const processImageWithAI = async (base64Data, startNumber) => {
                const systemPrompt = `你是一个高精度的文字识别与文件命名专家。任务：
                1. 识别图片中的文字，按行顺序排列。
                2. 每一行文字都要以 '方案{n}_' 为前缀重新命名，其中 {n} 是从 ${startNumber} 开始递增的整数。
                3. 识别必须极其精准，保留所有的中英文符号，但要去除 Windows/Mac 文件夹命名不允许的非法字符。
                4. 自动识别并忽略图片中的水印背景、UI装饰元素或系统通知文字。
                5. 只返回重命名后的列表，每行一个。不要包含 Markdown 格式。`;

                const payload = {
                    contents: [{
                        parts: [
                            { text: `请识别这张截图内容。请从数字 ${startNumber} 开始进行递增命名。` },
                            { inlineData: { mimeType: "image/png", data: base64Data } }
                        ]
                    }],
                    systemInstruction: { parts: [{ text: systemPrompt }] }
                };

                return await callGemini(payload);
            };

            const startProcessing = async (targetImages) => {
                if (targetImages.length === 0) return;
                setProcessing(true);
                setProgress(0);
                setResults([]);
                
                let allResults = [];
                let currentGlobalNumber = 1;
                try {
                    for (let i = 0; i < targetImages.length; i++) {
                        const base64 = await convertToBase64(targetImages[i].file);
                        const textOutput = await processImageWithAI(base64, currentGlobalNumber);
                        const names = textOutput.split('\n')
                            .map(line => line.replace(/^[\s\d\.\-*#]+/, '').trim())
                            .filter(line => line.length > 0);
                            
                        allResults.push({ imageId: targetImages[i].id, names });
                        currentGlobalNumber += names.length;
                        setProgress(Math.round(((i + 1) / targetImages.length) * 100));
                    }
                    setResults(allResults);
                } catch (error) { 
                    setErrorMsg("识别失败: " + error.message);
                    console.error(error);
                } finally { 
                    setProcessing(false); 
                }
            };

            const handleNameChange = (resultIdx, nameIdx, newValue) => {
                const newResults = [...results];
                newResults[resultIdx].names[nameIdx] = newValue;
                setResults(newResults);
            };

            const exportAsZip = async () => {
                if (results.length === 0) return;
                setIsExporting(true);
                const zip = new JSZip();
                
                results.forEach(res => {
                    res.names.forEach(name => {
                        const safeName = name.replace(/[<>:"/\\|?*]/g, '').trim();
                        if (safeName) {
                            const folder = zip.folder(safeName);
                            folder.file('说明.txt', '文件夹由 AI 智能截图命名工具生成。');
                        }
                    });
                });

                try {
                    const content = await zip.generateAsync({ type: 'blob' });
                    saveAs(content, `方案文件夹导出_${new Date().getTime()}.zip`);
                } catch (err) {
                    console.error("ZIP Generation error:", err);
                } finally {
                    setIsExporting(false);
                }
            };

            return (
                <div className="min-h-screen text-slate-900 font-sans p-4 md:p-8">
                    <div className="max-w-6xl mx-auto">
                        <header className="flex flex-col md:flex-row justify-between items-start mb-8 gap-4">
                            <div className="flex items-center gap-4">
                                <div className="bg-gradient-to-tr from-blue-600 to-indigo-600 p-3 rounded-2xl shadow-xl shadow-blue-100 flex items-center justify-center">
                                    <Icon name="list-ordered" className="text-white" size={28} />
                                </div>
                                <div>
                                    <h1 className="text-2xl font-black tracking-tight text-slate-800 uppercase">Auto Namer Online</h1>
                                    <p className="text-slate-500 text-xs font-bold tracking-widest uppercase">网页部署版 · 智能识别 · 自动生成</p>
                                </div>
                            </div>
                            
                            {/* API Key 设置区域 */}
                            <div className="w-full md:w-auto flex flex-col gap-2">
                                <div className="flex items-center gap-2 bg-white border border-slate-200 rounded-xl px-3 py-2 shadow-sm focus-within:ring-2 focus-within:ring-blue-500/20 transition-all">
                                    <Icon name="key" className="text-slate-400" size={16} />
                                    <input 
                                        type="password" 
                                        placeholder="输入 Gemini API Key" 
                                        className="text-xs font-mono outline-none w-48 md:w-64"
                                        value={localApiKey}
                                        onChange={(e) => saveApiKey(e.target.value)}
                                    />
                                </div>
                                <p className="text-[10px] text-slate-400 text-right font-medium italic">* Key 仅保存在您的浏览器本地，不会上传服务器</p>
                            </div>
                        </header>

                        {errorMsg && (
                            <div className="mb-6 bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-2xl text-sm font-bold flex items-center gap-2 animate-bounce">
                                <span className="text-lg">⚠️</span> {errorMsg}
                            </div>
                        )}

                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                            <div className="lg:col-span-5 space-y-6">
                                <div 
                                    className={`group border-2 border-dashed rounded-[2rem] p-10 transition-all flex flex-col items-center justify-center min-h-[300px] cursor-pointer
                                    ${images.length > 0 ? 'border-blue-200 bg-white' : 'border-slate-300 bg-white hover:border-blue-500 hover:bg-blue-50/30'}`}
                                    onClick={() => document.getElementById('fileInput').click()}
                                >
                                    <input type="file" id="fileInput" className="hidden" multiple accept="image/*" onChange={handleFileChange} />
                                    <div className="bg-blue-50 p-6 rounded-full mb-6 group-hover:scale-110 transition-transform flex items-center justify-center">
                                        <Icon name="upload" className="text-blue-600" size={40} />
                                    </div>
                                    <h3 className="font-bold text-lg">上传顺序截图</h3>
                                    <p className="text-slate-400 text-sm mt-2 text-center px-4">支持多选，AI 将按文件顺序识别</p>
                                </div>

                                {images.length > 0 && (
                                    <div className="bg-white p-6 rounded-[2rem] border border-slate-200 shadow-sm">
                                        <div className="flex justify-between items-center mb-6">
                                           <h4 className="font-black text-slate-800 text-sm uppercase tracking-wider flex items-center gap-2">
                                             <Icon name="image" className="text-blue-500" size={16}/> 队列图片 ({images.length})
                                           </h4>
                                           {!processing && (
                                             <button onClick={() => {setImages([]); setResults([]);}} className="text-slate-400 text-xs font-bold hover:text-red-500 transition-colors">清空</button>
                                           )}
                                        </div>
                                        <div className="grid grid-cols-4 gap-3">
                                            {images.map((img, i) => (
                                                <div key={img.id} className="relative aspect-square rounded-xl overflow-hidden border-2 border-slate-50 group">
                                                    <img src={img.preview} className="w-full h-full object-cover" alt="Preview" />
                                                    <div className="absolute top-1 left-1 bg-black/60 text-white text-[10px] px-1.5 py-0.5 rounded font-bold">#{i+1}</div>
                                                    {!processing && (
                                                        <button 
                                                            onClick={(e) => { e.stopPropagation(); setImages(prev => prev.filter(item => item.id !== img.id)); }}
                                                            className="absolute inset-0 bg-red-500/80 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity"
                                                        >
                                                            <Icon name="trash-2" className="text-white" size={18} />
                                                        </button>
                                                    )}
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>

                            <div className="lg:col-span-7 flex flex-col gap-6">
                                {processing && (
                                    <div className="bg-white p-12 rounded-[2rem] border border-slate-200 flex flex-col items-center justify-center text-center space-y-6">
                                        <div className="relative w-20 h-20">
                                            <div className="absolute inset-0 border-4 border-blue-100 rounded-full animate-pulse"></div>
                                            <div className="absolute inset-0 border-4 border-blue-600 rounded-full border-t-transparent animate-spin"></div>
                                            <div className="absolute inset-0 flex items-center justify-center font-bold text-blue-600">{progress}%</div>
                                        </div>
                                        <h3 className="font-bold text-lg">正在智能识别并自动命名...</h3>
                                        <p className="text-slate-400 text-sm italic">AI 正在按顺序解析图片内容，请耐心等待</p>
                                    </div>
                                )}

                                {!processing && results.length > 0 && (
                                    <div className="bg-white border border-slate-200 rounded-[2rem] shadow-sm flex-1 flex flex-col overflow-hidden">
                                         <div className="p-6 border-b border-slate-100 flex items-center justify-between bg-slate-50/50">
                                            <div>
                                              <h3 className="font-black text-slate-800 uppercase tracking-widest text-sm flex items-center gap-2">
                                                <Icon name="edit-3" className="text-blue-500" size={16}/> 生成的命名序列
                                              </h3>
                                              <p className="text-[10px] text-slate-400 font-bold uppercase mt-1">您可以直接修改下方的文本内容</p>
                                            </div>
                                            <button 
                                              onClick={() => {
                                                const text = results.flatMap(r => r.names).join('\n');
                                                const el = document.createElement('textarea');
                                                el.value = text; document.body.appendChild(el);
                                                el.select(); document.execCommand('copy');
                                                document.body.removeChild(el);
                                                setErrorMsg("复制成功！");
                                                setTimeout(() => setErrorMsg(""), 2000);
                                              }}
                                              className="bg-white border border-slate-200 text-blue-600 px-4 py-2 rounded-xl text-xs font-black flex items-center gap-2 hover:bg-blue-50 transition-all shadow-sm active:scale-95"
                                            >
                                              <Icon name="copy" size={14}/> 复制全文
                                            </button>
                                         </div>
                                         <div className="p-6 overflow-y-auto max-h-[600px] custom-scrollbar space-y-6">
                                            {results.map((res, ridx) => (
                                              <div key={ridx} className="space-y-3">
                                                 <div className="flex items-center gap-2 px-2">
                                                    <span className="w-2 h-2 rounded-full bg-blue-400"></span>
                                                    <span className="text-[10px] font-black text-slate-400 uppercase tracking-tighter">来自图片 #{ridx + 1}</span>
                                                 </div>
                                                 {res.names.map((name, nidx) => (
                                                   <div key={nidx} className="flex items-center gap-3 group">
                                                      <div className="bg-slate-100 w-10 h-10 rounded-xl flex-shrink-0 flex items-center justify-center font-black text-slate-400 text-[10px] border border-slate-200 group-focus-within:bg-blue-600 group-focus-within:text-white group-focus-within:border-blue-600 transition-all">
                                                         {name.match(/方案(\d+)_/)?.[1] || "?"}
                                                      </div>
                                                      <div className="flex-1 relative">
                                                        <input 
                                                          type="text"
                                                          value={name}
                                                          onChange={(e) => handleNameChange(ridx, nidx, e.target.value)}
                                                          className="w-full bg-white border border-slate-200 rounded-xl px-4 py-2.5 text-sm font-mono font-bold text-slate-700 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition-all pr-10"
                                                        />
                                                        <div className="absolute right-3 top-1/2 -translate-y-1/2 flex items-center justify-center">
                                                            <Icon name="save" size={14} className="text-slate-300 group-focus-within:text-blue-500" />
                                                        </div>
                                                      </div>
                                                   </div>
                                                 ))}
                                              </div>
                                            ))}
                                         </div>
                                         <div className="p-4 bg-blue-600">
                                            <button 
                                              onClick={exportAsZip}
                                              disabled={isExporting}
                                              className="w-full flex items-center justify-center gap-3 text-white font-black text-sm uppercase tracking-widest py-2 transition-opacity hover:opacity-90 disabled:opacity-50"
                                            >
                                              {isExporting ? <span className="animate-spin inline-block">⏳</span> : <Icon name="download" size={18} />}
                                              确认并下载 ZIP 文件夹
                                            </button>
                                         </div>
                                    </div>
                                )}

                                {!processing && results.length === 0 && (
                                    <div className="bg-white border-2 border-dashed border-slate-200 rounded-[2rem] flex-1 flex flex-col items-center justify-center text-slate-300 py-20">
                                        <Icon name="layout-grid" size={48} className="mb-4 opacity-20" />
                                        <p className="font-bold uppercase tracking-widest text-xs">等待上传图片...</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
