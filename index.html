<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 智能截图命名工具 - 共享版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background-color: #f8fafc; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // 硬编码 API Key，确保共享使用
        const SHARED_API_KEY = "AIzaSyBVCsVEJZXKaF1hb-B6ncmCvp5_ReSaQzY";

        const LucideIcon = ({ d, size = 20, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d={d} />
            </svg>
        );

        function App() {
            const [images, setImages] = useState([]);
            const [isProcessing, setIsProcessing] = useState(false);
            const [results, setResults] = useState([]);
            const [error, setError] = useState(null);
            const [progress, setProgress] = useState(0);

            const handleFileChange = async (e) => {
                const files = Array.from(e.target.files);
                if (files.length === 0) return;
                
                setError(null);
                const newImages = files.map(file => ({
                    file,
                    preview: URL.createObjectURL(file),
                    id: Math.random().toString(36).substr(2, 9)
                }));
                
                setImages(newImages);
                processAllImages(newImages);
            };

            const processAllImages = async (targetImages) => {
                setIsProcessing(true);
                setProgress(0);
                const allData = [];

                try {
                    for (let i = 0; i < targetImages.length; i++) {
                        const img = targetImages[i];
                        const base64 = await toBase64(img.file);
                        const text = await callGeminiAPI(base64);
                        
                        const lines = text.split('\n')
                                          .map(l => l.replace(/^[*\-\s\d.]+/, '').trim())
                                          .filter(l => l.length > 0);
                        
                        allData.push({ id: img.id, names: lines });
                        setProgress(Math.round(((i + 1) / targetImages.length) * 100));
                    }
                    setResults(allData);
                } catch (err) {
                    setError("识别失败: " + err.message);
                } finally {
                    setIsProcessing(false);
                }
            };

            const toBase64 = (file) => new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result.split(',')[1]);
                reader.onerror = error => reject(error);
            });

            const callGeminiAPI = async (base64Data) => {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${SHARED_API_KEY}`;
                const payload = {
                    contents: [{
                        parts: [
                            { text: "识别图片中的所有方案标题。只返回列表，每行一个。" },
                            { inlineData: { mimeType: "image/png", data: base64Data } }
                        ]
                    }]
                };

                const resp = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!resp.ok) {
                    const errorData = await resp.json();
                    throw new Error(errorData.error?.message || "API 响应错误");
                }
                const data = await resp.json();
                return data.candidates?.[0]?.content?.parts?.[0]?.text || "";
            };

            return (
                <div className="max-w-6xl mx-auto p-6 md:p-12">
                    <header className="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
                        <div className="flex items-center gap-4">
                            <div className="bg-blue-600 p-3 rounded-2xl shadow-lg">
                                <LucideIcon d="M4 6h16M4 12h16M4 18h7" size={24} className="text-white" />
                            </div>
                            <div>
                                <h1 className="text-2xl font-black text-slate-800 tracking-tight uppercase">Auto Namer <span className="text-blue-600">Pro</span></h1>
                                <div className="flex items-center gap-1.5 mt-1">
                                    <span className="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                                    <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">AI Service Online</p>
                                </div>
                            </div>
                        </div>
                        {/* 移除了 API Key 输入框 */}
                    </header>

                    {error && (
                        <div className="mb-8 bg-red-50 border-l-4 border-red-500 p-4 rounded-r-xl text-red-700 text-sm font-bold shadow-md">
                            {error}
                        </div>
                    )}

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-10">
                        <div className="space-y-6">
                            <div 
                                onClick={() => document.getElementById('u-file').click()}
                                className="h-80 border-4 border-dashed border-slate-200 rounded-[2.5rem] bg-white flex flex-col items-center justify-center cursor-pointer hover:bg-blue-50 hover:border-blue-200 transition-all group"
                            >
                                <input type="file" id="u-file" hidden multiple onChange={handleFileChange} />
                                <div className="bg-blue-100 p-6 rounded-full text-blue-600 mb-4 group-hover:scale-110 transition-transform shadow-inner">
                                    <LucideIcon d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12" size={32} />
                                </div>
                                <p className="font-bold text-slate-600">直接上传或拖拽截图</p>
                                <p className="text-slate-400 text-xs mt-2 uppercase tracking-tighter">无需配置 Key，已预设共享服务</p>
                            </div>

                            {images.length > 0 && (
                                <div className="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-100">
                                    <h3 className="text-xs font-black text-slate-400 uppercase tracking-widest mb-4">当前队列 ({images.length})</h3>
                                    <div className="grid grid-cols-4 gap-3">
                                        {images.map(img => (
                                            <div key={img.id} className="aspect-square rounded-2xl overflow-hidden border border-slate-100 shadow-sm">
                                                <img src={img.preview} className="w-full h-full object-cover" />
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>

                        <div className="flex flex-col min-h-[400px]">
                            {isProcessing ? (
                                <div className="bg-white rounded-[2.5rem] flex-1 border border-slate-200 p-12 flex flex-col items-center justify-center text-center shadow-inner">
                                    <div className="w-16 h-16 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-6"></div>
                                    <h2 className="text-xl font-bold text-slate-800">AI 正在拼命识别...</h2>
                                    <p className="text-slate-400 mt-2 text-sm">{progress}% 已完成</p>
                                </div>
                            ) : results.length > 0 ? (
                                <div className="bg-white rounded-[2.5rem] border border-slate-200 shadow-xl overflow-hidden flex flex-col h-full max-h-[600px]">
                                    <div className="p-6 bg-slate-50 border-b flex justify-between items-center">
                                        <h2 className="font-black text-slate-800 text-sm tracking-widest uppercase">识别结果</h2>
                                        <button 
                                            onClick={() => {
                                                const text = results.flatMap(r => r.names).join('\n');
                                                navigator.clipboard.writeText(text);
                                                alert("✨ 已复制到剪贴板");
                                            }}
                                            className="text-xs bg-blue-600 text-white px-5 py-2 rounded-xl font-black hover:bg-blue-700 transition-all shadow-lg"
                                        >
                                            一键复制
                                        </button>
                                    </div>
                                    <div className="p-6 overflow-y-auto space-y-4 custom-scrollbar">
                                        {results.map((res, idx) => (
                                            <div key={res.id} className="border-l-2 border-blue-100 pl-4 py-2">
                                                <p className="text-[10px] font-black text-blue-500 mb-2 uppercase">Image #{idx+1}</p>
                                                {res.names.map((name, nidx) => (
                                                    <div key={nidx} className="bg-slate-50 p-3 rounded-xl mb-2 font-mono text-sm text-slate-700 border border-slate-100">
                                                        {name}
                                                    </div>
                                                ))}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            ) : (
                                <div className="bg-white rounded-[2.5rem] flex-1 border-2 border-dashed border-slate-200 flex flex-col items-center justify-center text-slate-300">
                                    <LucideIcon d="M9 17v-2a4 4 0 0 1 4-4h2" size={48} className="mb-4 opacity-10" />
                                    <p className="font-black text-xs tracking-widest uppercase">等待数据处理</p>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
